name: CI — Tests y pipeline diario

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * *'

jobs:
  dbt-test:
    name: dbt tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install dbt-bigquery==1.11.1
      - name: Crear credentials.json
        run: echo '${{ secrets.BIGQUERY_CREDS }}' > /tmp/credentials.json
      - name: Crear profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          norfrig_dbt:
            target: dev
            outputs:
              dev:
                type: bigquery
                method: service-account
                project: ${{ secrets.BIGQUERY_PROJECT }}
                dataset: ${{ secrets.BIGQUERY_DATASET }}
                keyfile: /tmp/credentials.json
                location: US
                threads: 4
                timeout_seconds: 300
          EOF
      - name: dbt deps
        working-directory: transform/norfrig_dbt
        run: dbt deps
      - name: dbt run
        working-directory: transform/norfrig_dbt
        run: dbt run
      - name: dbt test
        working-directory: transform/norfrig_dbt
        run: dbt test

  ingesta-ventas:
    name: Ingesta ventas
    runs-on: ubuntu-latest
    needs: dbt-test
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - name: Crear .env
        run: |
          cat > .env << EOF
          EMAIL_NORFRIG=${{ secrets.EMAIL_NORFRIG }}
          APIKEY_NORFRIG=${{ secrets.APIKEY_NORFRIG }}
          BIGQUERY_PROJECT=${{ secrets.BIGQUERY_PROJECT }}
          BIGQUERY_DATASET=${{ secrets.BIGQUERY_DATASET }}
          BIGQUERY_CREDS=${{ secrets.BIGQUERY_CREDS }}
          DRIVE_CARPETA_COMPRAS_ID=${{ secrets.DRIVE_CARPETA_COMPRAS_ID }}
          EOF
      - name: Build y run ventas
        run: |
          docker build -t norfrig-ventas ./ingestion/ventas
          docker run --env-file .env norfrig-ventas

  ingesta-devoluciones:
    name: Ingesta devoluciones
    runs-on: ubuntu-latest
    needs: ingesta-ventas
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - name: Crear .env
        run: |
          cat > .env << EOF
          EMAIL_NORFRIG=${{ secrets.EMAIL_NORFRIG }}
          APIKEY_NORFRIG=${{ secrets.APIKEY_NORFRIG }}
          BIGQUERY_PROJECT=${{ secrets.BIGQUERY_PROJECT }}
          BIGQUERY_DATASET=${{ secrets.BIGQUERY_DATASET }}
          BIGQUERY_CREDS=${{ secrets.BIGQUERY_CREDS }}
          DRIVE_CARPETA_COMPRAS_ID=${{ secrets.DRIVE_CARPETA_COMPRAS_ID }}
          EOF
      - name: Build y run devoluciones
        run: |
          docker build -t norfrig-devoluciones ./ingestion/devoluciones
          docker run --env-file .env norfrig-devoluciones

  ingesta-stock:
    name: Ingesta stock
    runs-on: ubuntu-latest
    needs: ingesta-devoluciones
    if: github.event_name == 'schedule'
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Crear .env
        run: |
          cat > .env << EOF
          EMAIL_NORFRIG=${{ secrets.EMAIL_NORFRIG }}
          APIKEY_NORFRIG=${{ secrets.APIKEY_NORFRIG }}
          BIGQUERY_PROJECT=${{ secrets.BIGQUERY_PROJECT }}
          BIGQUERY_DATASET=${{ secrets.BIGQUERY_DATASET }}
          BIGQUERY_CREDS=${{ secrets.BIGQUERY_CREDS }}
          DRIVE_CARPETA_COMPRAS_ID=${{ secrets.DRIVE_CARPETA_COMPRAS_ID }}
          EOF
      - name: Build y run stock
        run: |
          docker build -t norfrig-stock ./ingestion/stock
          docker run --env-file .env norfrig-stock

  dbt-recalcular:
    name: Recalcular semáforo
    runs-on: ubuntu-latest
    needs: ingesta-stock
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install dbt-bigquery==1.11.1
      - name: Crear credentials.json
        run: echo '${{ secrets.BIGQUERY_CREDS }}' > /tmp/credentials.json
      - name: Crear profiles.yml
        run: |
          mkdir -p ~/.dbt
          cat > ~/.dbt/profiles.yml << EOF
          norfrig_dbt:
            target: dev
            outputs:
              dev:
                type: bigquery
                method: service-account
                project: ${{ secrets.BIGQUERY_PROJECT }}
                dataset: ${{ secrets.BIGQUERY_DATASET }}
                keyfile: /tmp/credentials.json
                location: US
                threads: 4
                timeout_seconds: 300
          EOF
      - name: dbt run
        working-directory: transform/norfrig_dbt
        run: dbt run
      - name: dbt test
        working-directory: transform/norfrig_dbt
        run: dbt test

  ingesta-recepciones:
    name: Detectar recepciones
    runs-on: ubuntu-latest
    needs: dbt-recalcular
    if: github.event_name == 'schedule'
    steps:
      - uses: actions/checkout@v4
      - name: Crear .env
        run: |
          cat > .env << EOF
          EMAIL_NORFRIG=${{ secrets.EMAIL_NORFRIG }}
          APIKEY_NORFRIG=${{ secrets.APIKEY_NORFRIG }}
          BIGQUERY_PROJECT=${{ secrets.BIGQUERY_PROJECT }}
          BIGQUERY_DATASET=${{ secrets.BIGQUERY_DATASET }}
          BIGQUERY_CREDS=${{ secrets.BIGQUERY_CREDS }}
          DRIVE_CARPETA_COMPRAS_ID=${{ secrets.DRIVE_CARPETA_COMPRAS_ID }}
          EOF
      - name: Build y run recepciones
        run: |
          docker build -t norfrig-recepciones ./detection/recepciones
          docker run --env-file .env norfrig-recepciones